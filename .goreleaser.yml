version: 2

project_name: mb

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - main: .
    binary: mb
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/LeartS/mb/cmd/root.version={{.Version}}
      - -X github.com/LeartS/mb/cmd/root.commit={{.Commit}}
      - -X github.com/LeartS/mb/cmd/root.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: LeartS
      name: homebrew-tap
    homepage: "https://github.com/LeartS/mb"
    description: "Metabase CLI — work with Metabase from the command line"
    license: "MIT"
    install: |
      bin.install "mb"
    test: |
      system "#{bin}/mb", "--version"
